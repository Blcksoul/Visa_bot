version: "3.9"

services:
  visa-bot:
    build: .
    container_name: visa_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data          # persistent SQLite DB lives here
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/visa_bot.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
